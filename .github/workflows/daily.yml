name: daily-digest

on:
  schedule:
    - cron: "0 1 * * *" # 09:00 Singapore time, daily
  workflow_dispatch: {} # manual trigger for testing

permissions:
  contents: write # to commit the daily price snapshot back

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Fetch prices, compute signals, send digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          POKEMONTCG_API_KEY: ${{ secrets.POKEMONTCG_API_KEY }}
        run: python -m pokebot run

      - name: Commit price history
        run: |
          git config user.name "pokebot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: daily snapshot $(date -u +%F)"
          git push
